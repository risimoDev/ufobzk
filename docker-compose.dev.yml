# ═══════════════════════════════════════════
#  Локальная разработка — только ufo-app + xray
#  Без nginx, без SSL, без certbot
# ═══════════════════════════════════════════
#  Запуск: docker compose -f docker-compose.dev.yml up -d --build
#  Открыть: http://localhost:8000

services:

  ufo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ufobzk-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - XRAY_CONFIG_PATH=/etc/xray/config.json
    volumes:
      - ./data:/project/data
      - ./app:/project/app
      - xray-config:/etc/xray
    depends_on:
      - xray

  xray:
    image: teddysun/xray:latest
    container_name: ufobzk-xray
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - xray-config:/etc/xray
      - xray-logs:/var/log/xray
    command: ["xray", "run", "-config", "/etc/xray/config.json"]

volumes:
  xray-config:
  xray-logs:

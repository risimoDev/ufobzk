# ═══════════════════════════════════════════
#  VPNBZK — Production Docker Compose
#  UFO site + Xray core + Nginx + Certbot
# ═══════════════════════════════════════════

services:

  # ── Nginx — reverse proxy + SSL ──
  nginx:
    image: nginx:1.27-alpine
    container_name: vpnbzk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    environment:
      - DOMAIN=${DOMAIN}
      - ADMIN_WHITELIST_IPS=${ADMIN_IPS:-127.0.0.1}
    entrypoint: "/bin/sh -c 'echo \"$$ADMIN_WHITELIST_IPS\" | tr \",\" \"\\n\" | while read -r ip; do ip=$$(echo $$ip | tr -d \" \"); [ -n \"$$ip\" ] && echo \"allow $$ip;\"; done > /etc/nginx/whitelist.conf && cat /etc/nginx/whitelist.conf && envsubst \"\\$$DOMAIN\" < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g \"daemon off;\"'"
    depends_on:
      ufo-app:
        condition: service_healthy
      xray:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qS -O /dev/null http://127.0.0.1:80/ 2>&1 | grep -qE '301|200' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - frontend
      - backend

  # ── Certbot — SSL auto-renew ──
  certbot:
    image: certbot/certbot:latest
    container_name: vpnbzk-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Первый запуск: получить сертификат
    # docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d $DOMAIN --email $EMAIL --agree-tos --no-eff-email
    # Автообновление через entrypoint:
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - frontend

  # ── Xray — VPN ядро ──
  xray:
    image: teddysun/xray:latest
    container_name: vpnbzk-xray
    restart: unless-stopped
    ports:
      # REALITY порт — прямое подключение без CDN
      - "${REALITY_PORT:-2053}:443"
    expose:
      - "8443"
      - "10085"
    volumes:
      - xray-config:/etc/xray
      - xray-logs:/var/log/xray
    # Ждём конфиг от ufo-app (он создаётся при старте приложения)
    entrypoint: ["/bin/sh", "-c", "until [ -f /etc/xray/config.json ]; do echo 'Waiting for xray config...'; sleep 2; done; exec xray run -config /etc/xray/config.json"]
    networks:
      - backend

  # ── UFO App — FastAPI приложение ──
  ufo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpnbzk-app
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - XRAY_CONFIG_PATH=/etc/xray/config.json
    volumes:
      - app-data:/project/data
      - xray-config:/etc/xray
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      xray:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - backend

# ── Сети ──
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# ── Тома ──
volumes:
  app-data:
  xray-config:
  xray-logs:
  certbot-webroot:
  certbot-certs:
  nginx-logs:

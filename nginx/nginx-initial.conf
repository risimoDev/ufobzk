# Начальный конфиг Nginx — только HTTP, без SSL.
# Используется при первом запуске для получения Let's Encrypt сертификата.
# После получения сертификата переключитесь на основной nginx.conf.

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    server {
        listen 80;
        server_name ${DOMAIN};

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'Waiting for SSL certificate...';
            add_header Content-Type text/plain;
        }
    }
}

# ═══════════════════════════════════════════════════
#  VPNBZK — Nginx reverse-proxy + SSL termination
#  Шаблон: подставь ${DOMAIN}, whitelist через /etc/nginx/whitelist.conf
#  через envsubst в docker-compose entrypoint
# ═══════════════════════════════════════════════════

# ── Глобальные ──

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;
    client_max_body_size 10m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Блокировка по количеству соединений с одного IP
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
    limit_conn conn_per_ip 20;
    limit_conn_status 429;

    # Логи
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;

    # Скрыть версию
    server_tokens off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=sub:10m rate=10r/m;
    limit_req_status 429;

    # ── Upstream'ы ──

    upstream ufo_app {
        server ufo-app:8000;
    }

    upstream xray_ws {
        server xray:8443;
    }

    # ── HTTP → HTTPS redirect + ACME challenge ──

    server {
        listen 80;
        server_name ${DOMAIN};

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Основной HTTPS-сервер ──

    server {
        listen 443 ssl http2;
        server_name ${DOMAIN};

        # ── SSL ──
        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options            "SAMEORIGIN" always;
        add_header X-Content-Type-Options      "nosniff"    always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection            "1; mode=block" always;
        add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;

        # ── Блокировка сканеров ──
        location ~* ^/(wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|phpmyadmin|admin\.php|\.env|\.git|\.aws|\.ssh|actuator|shell|config\.php) {
            access_log off;
            return 444;
        }

        # ── /admin — админ-панель (IP-ограничение) ──
        location /admin {
            include /etc/nginx/whitelist.conf;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://ufo_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── /login — rate-limited ──
        location /login {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://ufo_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── /sub/ — подписки VPN ──
        location /sub/ {
            limit_req zone=sub burst=5 nodelay;

            proxy_pass http://ufo_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── / — всё остальное → UFO-приложение ──
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://ufo_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Статика UFO-приложения ──
        location /static/ {
            proxy_pass http://ufo_app/static/;
            proxy_cache_valid 200 1d;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── VLESS WebSocket — проксирование в Xray ядро ──
        # Трафик приходит как обычный HTTPS, nginx проксирует по path
        # в Xray ядро. Для DPI это выглядит как обычный сайт.
        location /vless-ws {
            proxy_pass http://xray_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}

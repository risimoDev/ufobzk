# ═══════════════════════════════════════════════
#  fail2ban jail для VPNBZK
#  Устанавливается на хосте (не в Docker)
# ═══════════════════════════════════════════════

[vpnbzk]
enabled  = true
filter   = vpnbzk
# Логи nginx из Docker — монтировать volume или использовать docker logs
logpath  = /var/log/nginx/access.log
port     = http,https
# 5 попыток за 10 минут → бан на 1 час
maxretry = 5
findtime = 600
bantime  = 3600
# Использовать iptables для блокировки
banaction = iptables-multiport
action   = %(action_mwl)s

[vpnbzk-aggressive]
enabled  = true
filter   = vpnbzk
logpath  = /var/log/nginx/access.log
port     = http,https
# 20 попыток за 1 час → бан на 24 часа (повторный нарушитель)
maxretry = 20
findtime = 3600
bantime  = 86400
banaction = iptables-multiport
action   = %(action_mwl)s

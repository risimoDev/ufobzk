# ═══════════════════════════════════════════════
#  fail2ban filter для VPNBZK
#  Ловит неудачные попытки входа в nginx логах
# ═══════════════════════════════════════════════

[Definition]

# Неудачный логин (POST /login → 200 с ошибкой или 429)
failregex = ^<HOST> - \[.*\] "POST /login\b.*" (429|403) 
            ^<HOST> - \[.*\] "POST /admin\b.*" (403|429) 
            ^<HOST> - \[.*\] "(GET|POST) /(wp-admin|wp-login|phpmyadmin|\.env|\.git|xmlrpc)\b.*" 
            ^<HOST> - \[.*\] ".*" 444 

ignoreregex =

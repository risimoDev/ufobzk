<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — НИИАЯ </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { background: #080818; min-height: 100vh; color: #d1d5db; }
    .stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.7), transparent),
        radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,.5), transparent),
        radial-gradient(1px 1px at 88% 40%, rgba(255,255,255,.6), transparent),
        radial-gradient(1px 1px at 30% 65%, rgba(0,255,200,.25), transparent),
        radial-gradient(1px 1px at 72% 80%, rgba(255,255,255,.4), transparent),
        radial-gradient(1px 1px at 20% 85%, rgba(0,255,200,.15), transparent);
      background-size: 300px 300px;
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity:.4 } to { opacity:1 } }
    .glass {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.09);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      box-shadow: 0 0 30px rgba(0,255,200,.04), inset 0 1px 0 rgba(255,255,255,.03);
    }
    .input-field {
      width: 100%; padding: .75rem 1rem;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: .75rem; font-size: .9rem; color: #d1d5db; outline: none;
      transition: border-color .2s;
      box-sizing: border-box;
    }
    .input-field:focus { border-color: rgba(0,255,200,.35); box-shadow: 0 0 0 2px rgba(0,255,200,.06); }
    .btn-submit {
      width: 100%; padding: .875rem;
      background: rgba(0,255,200,.1); color: #00ffc8;
      border: 1px solid rgba(0,255,200,.25); border-radius: .875rem;
      font-size: .95rem; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .btn-submit:hover { background: rgba(0,255,200,.18); box-shadow: 0 0 20px rgba(0,255,200,.12); }
    .glow-text { text-shadow: 0 0 20px rgba(0,255,200,.45); }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,255,200,.008) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,.008) 1px, transparent 1px);
      background-size: 64px 64px;
    }
  </style>
</head>
<body class="font-sans flex items-center justify-center px-4 py-8">
  <div class="stars"></div>

  <div class="relative z-10 w-full" style="max-width:420px">

    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2">
        <span style="font-size:2rem">&#x1f6e1;&#xfe0f;</span>
        <span class="glow-text font-bold" style="font-size:1.5rem;color:#00ffc8">Вход в НИИАЯ</span>
      </a>
    </div>

    {% if error %}
    <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:.75rem;padding:.75rem 1rem;margin-bottom:1rem;color:#fca5a5;font-size:.875rem;text-align:center">
      {{ error }}
    </div>
    {% endif %}

    <div class="glass p-8">
      <h1 class="text-xl font-bold text-center mb-1" style="color:#00ffc8">Авторизация</h1>
      <p class="text-center text-xs mb-7" style="color:#4b5563">Введите логин и пароль, выданные администратором</p>

      <form method="POST" action="/login" style="display:flex;flex-direction:column;gap:1.2rem">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <div>
          <label for="username" style="display:block;font-size:.8rem;color:#9ca3af;margin-bottom:.4rem">Логин</label>
          <input type="text" id="username" name="username" autocomplete="username" placeholder="your_login" class="input-field" />
        </div>
        <div>
          <label for="password" style="display:block;font-size:.8rem;color:#9ca3af;margin-bottom:.4rem">Пароль</label>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" class="input-field" />
        </div>
        <button type="submit" class="btn-submit">&#x1f513; Войти</button>
      </form>
    </div>

    <div class="text-center mt-6">
      <a href="/" style="color:#4b5563;font-size:.875rem;text-decoration:none" onmouseover="this.style.color='#9ca3af'" onmouseout="this.style.color='#4b5563'">&#x2190; На главную</a>
    </div>

  </div>
</body>
</html>
